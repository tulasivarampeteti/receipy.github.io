<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍽️ Recipe Finder</h1>
        <p>Find delicious recipes in seconds!</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for a recipe...">
        <button onclick="searchRecipe()">Search</button>
    </div>

    <div id="recipes" class="recipe-container"></div>

    <!-- Recipe Popup -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>

            <h2  id="recipeTitle"></h2>
            <img id="recipeImage" src="" alt="Recipe Image">

            <h3>Ingredients</h3>
            <ul id="ingredients"></ul>

            <h3>Instructions</h3>
            <p id="instructions"></p>
        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
